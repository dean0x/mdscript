name: Setup WASM toolchain
description: >
  Install wasm-pack and Binaryen wasm-opt. Version pins are maintained here
  so updates to wasm-pack or Binaryen only need to happen in one place.

runs:
  using: composite
  steps:
    - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa  # v0.4.0
      with:
        version: v0.14.0
    - uses: phi-ag/setup-binaryen@f7f99985a69ad20f08b12ad725865b14a7f875a4  # v1.0.8
      with:
        version: 129
    - name: Verify wasm-opt
      shell: bash
      run: wasm-opt --version
