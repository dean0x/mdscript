[package]
name = "mds"
version = "0.1.0"
edition = "2021"
description = "MDS (Markdown Script) compiler — composable LLM prompt templates"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
miette = { version = "7", features = ["fancy"] }
thiserror = "2"
