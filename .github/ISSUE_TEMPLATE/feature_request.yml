name: Feature request
description: Suggest a new capability or improvement for MDS
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that MDS doesn't support today? What's the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        What should MDS do? If it's language syntax, show an example `.mds` snippet
        and the Markdown you'd expect it to compile to.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Language / compiler
        - CLI
        - JS/TS bindings
        - Bundler plugins
        - Documentation
        - Other
    validations:
      required: false
